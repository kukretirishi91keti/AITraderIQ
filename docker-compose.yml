version: "3.8"

services:
  backend:
    build: ./backend
    container_name: traderai-backend
    ports:
      - "8000:8000"
    environment:
      - DEMO_MODE=${DEMO_MODE:-true}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-this-in-production}
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:///./traderai.db}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000,http://localhost}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_PRICE_PRO=${STRIPE_PRICE_PRO:-}
      - STRIPE_PRICE_PREMIUM=${STRIPE_PRICE_PREMIUM:-}
      - RATE_LIMIT_DEFAULT=60/minute
      - RATE_LIMIT_AI=10/minute
      - RATE_LIMIT_AUTH=5/minute
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-json}
    volumes:
      - backend-data:/app/cache
      - db-data:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: "${VITE_API_BASE_URL:-}"
    container_name: traderai-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.1"

volumes:
  backend-data:
  db-data:
