services:
  - type: web
    name: traderai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1 --timeout-keep-alive 30
    envVars:
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://aitraderiq.netlify.app
      - key: DEMO_MODE
        value: "true"
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./traderai.db
      - key: PYTHON_VERSION
        value: "3.11"
